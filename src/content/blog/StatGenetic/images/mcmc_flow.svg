<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="860" viewBox="0 0 1100 860">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#333"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1100" height="860" fill="#fbfbfd"/>
  <text x="550" y="42" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#222">
    Metropolis-Hastings workflow
  </text>

  <rect x="375" y="70" width="350" height="70" rx="18" fill="#ffffff" stroke="#cfd4df" filter="url(#shadow)"/>
  <text x="550" y="113" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#333">Define target density π(x)</text>

  <line x1="550" y1="140" x2="550" y2="180" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="340" y="180" width="420" height="82" rx="18" fill="#ffffff" stroke="#cfd4df" filter="url(#shadow)"/>
  <text x="550" y="218" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#333">Choose proposal q(x* | x_t)</text>
  <text x="550" y="247" text-anchor="middle" font-size="20" font-family="Arial" fill="#666">for example, x* = x_t + Normal(0, σ²)</text>

  <line x1="550" y1="262" x2="550" y2="305" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="340" y="305" width="420" height="82" rx="18" fill="#ffffff" stroke="#cfd4df" filter="url(#shadow)"/>
  <text x="550" y="343" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#333">Initialize x₀</text>
  <text x="550" y="372" text-anchor="middle" font-size="20" font-family="Arial" fill="#666">pick any reasonable starting point</text>

  <line x1="550" y1="387" x2="550" y2="430" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="305" y="430" width="490" height="92" rx="18" fill="#ffffff" stroke="#cfd4df" filter="url(#shadow)"/>
  <text x="550" y="468" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#333">Propose candidate x* ~ q(x* | x_t)</text>
  <text x="550" y="498" text-anchor="middle" font-size="20" font-family="Arial" fill="#666">one local move, not a full redraw from π(x)</text>

  <line x1="550" y1="522" x2="550" y2="565" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="235" y="565" width="630" height="108" rx="18" fill="#ffffff" stroke="#cfd4df" filter="url(#shadow)"/>
  <text x="550" y="604" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#333">Compute acceptance probability</text>
  <text x="550" y="637" text-anchor="middle" font-size="22" font-family="Arial" fill="#333">α = min{1, [π(x*) q(x_t|x*)] / [π(x_t) q(x*|x_t)] }</text>

  <line x1="550" y1="673" x2="550" y2="712" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>

  <polygon points="550,712 700,785 550,858 400,785" fill="#ffffff" stroke="#cfd4df" filter="url(#shadow)"/>
  <text x="550" y="778" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#333">u &lt; α ?</text>
  <text x="550" y="808" text-anchor="middle" font-size="20" font-family="Arial" fill="#666">u ~ Uniform(0,1)</text>

  <line x1="700" y1="785" x2="915" y2="785" stroke="#0a7a45" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="770" y="770" font-size="22" font-family="Arial" font-weight="700" fill="#0a7a45">yes</text>
  <rect x="915" y="742" width="145" height="86" rx="18" fill="#e9f7ef" stroke="#0a7a45" filter="url(#shadow)"/>
  <text x="987" y="778" text-anchor="middle" font-size="22" font-family="Arial" font-weight="700" fill="#0a7a45">Set xₜ₊₁ = x*</text>
  <text x="987" y="807" text-anchor="middle" font-size="18" font-family="Arial" fill="#0a7a45">accepted</text>

  <line x1="400" y1="785" x2="185" y2="785" stroke="#c73b3b" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="328" y="770" font-size="22" font-family="Arial" font-weight="700" fill="#c73b3b">no</text>
  <rect x="40" y="742" width="145" height="86" rx="18" fill="#fff0f0" stroke="#c73b3b" filter="url(#shadow)"/>
  <text x="112" y="778" text-anchor="middle" font-size="22" font-family="Arial" font-weight="700" fill="#c73b3b">Set xₜ₊₁ = xₜ</text>
  <text x="112" y="807" text-anchor="middle" font-size="18" font-family="Arial" fill="#c73b3b">rejected</text>
</svg>