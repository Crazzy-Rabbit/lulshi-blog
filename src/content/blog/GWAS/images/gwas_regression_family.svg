<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
<rect width="1200" height="520" fill="#f7fbff"/>
<rect x="40" y="40" width="1120" height="440" rx="28" fill="#ffffff" stroke="#d7e6f5" stroke-width="3"/>
<text x="600" y="95" text-anchor="middle" font-size="34" font-family="Arial, Helvetica, sans-serif" fill="#1f4e79" font-weight="700">GWAS 回归模型全家福</text>
<text x="600" y="128" text-anchor="middle" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#4b647d">线性回归、逻辑回归、混合模型、稀有变异模型，本质上都在问同一件事</text>

<!-- Cute DNA -->
<g transform="translate(110,170)">
  <path d="M0 0 C40 40, 40 120, 0 160" stroke="#5b8ff9" stroke-width="10" fill="none"/>
  <path d="M80 0 C40 40, 40 120, 80 160" stroke="#ff8a65" stroke-width="10" fill="none"/>
  <line x1="14" y1="20" x2="66" y2="20" stroke="#8fb5dd" stroke-width="6"/>
  <line x1="8" y1="55" x2="72" y2="55" stroke="#8fb5dd" stroke-width="6"/>
  <line x1="8" y1="90" x2="72" y2="90" stroke="#8fb5dd" stroke-width="6"/>
  <line x1="14" y1="125" x2="66" y2="125" stroke="#8fb5dd" stroke-width="6"/>
  <circle cx="40" cy="186" r="42" fill="#f0f6ff" stroke="#b7d0ea" stroke-width="3"/>
  <circle cx="25" cy="180" r="5" fill="#203040"/>
  <circle cx="55" cy="180" r="5" fill="#203040"/>
  <path d="M24 200 Q40 214 56 200" stroke="#203040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="40" y="252" text-anchor="middle" font-size="20" font-family="Arial" fill="#1f4e79">基因型</text>
</g>

<!-- Regression machine -->
<g transform="translate(430,150)">
  <rect x="0" y="0" width="330" height="200" rx="26" fill="#eef6ff" stroke="#9bc2ea" stroke-width="4"/>
  <rect x="28" y="28" width="274" height="92" rx="18" fill="#ffffff" stroke="#b8d4ef" stroke-width="3"/>
  <text x="165" y="67" text-anchor="middle" font-size="28" font-family="Arial" fill="#1f4e79" font-weight="700">Regression</text>
  <text x="165" y="102" text-anchor="middle" font-size="22" font-family="Arial" fill="#54718e">β, SE, z, p</text>
  <circle cx="72" cy="155" r="24" fill="#5b8ff9"/>
  <circle cx="165" cy="155" r="24" fill="#7cc77a"/>
  <circle cx="258" cy="155" r="24" fill="#ffb74d"/>
  <text x="72" y="162" text-anchor="middle" font-size="18" font-family="Arial" fill="white">OLS</text>
  <text x="165" y="162" text-anchor="middle" font-size="18" font-family="Arial" fill="white">Logit</text>
  <text x="258" y="162" text-anchor="middle" font-size="18" font-family="Arial" fill="white">LMM</text>
  <rect x="125" y="210" width="80" height="18" rx="9" fill="#b9cde3"/>
</g>

<!-- Phenotype -->
<g transform="translate(900,165)">
  <rect x="0" y="0" width="170" height="150" rx="22" fill="#fff8ef" stroke="#f2c98e" stroke-width="4"/>
  <path d="M30 112 L30 60 L60 60 L60 40 L92 40 L92 78 L122 78 L122 112 Z" fill="#ffd89b" stroke="#e0a84d" stroke-width="3"/>
  <circle cx="50" cy="28" r="13" fill="#ffd89b" stroke="#e0a84d" stroke-width="3"/>
  <path d="M27 28 Q50 12 73 28" stroke="#e0a84d" stroke-width="3" fill="none"/>
  <text x="85" y="132" text-anchor="middle" font-size="22" font-family="Arial" fill="#8a5a16">表型</text>
  <text x="85" y="160" text-anchor="middle" font-size="16" font-family="Arial" fill="#8a5a16">定量 or 二分类</text>
</g>

<!-- arrows -->
<path d="M270 230 C345 230, 375 230, 430 230" stroke="#6f92b6" stroke-width="8" fill="none" stroke-linecap="round"/>
<polygon points="430,230 406,218 406,242" fill="#6f92b6"/>
<path d="M760 230 C830 230, 850 230, 900 230" stroke="#6f92b6" stroke-width="8" fill="none" stroke-linecap="round"/>
<polygon points="900,230 876,218 876,242" fill="#6f92b6"/>

<!-- bottom bubbles -->
<g transform="translate(125,385)">
  <rect x="0" y="0" width="190" height="55" rx="24" fill="#ecf6ff" stroke="#b7d0ea" stroke-width="2"/>
  <text x="95" y="35" text-anchor="middle" font-size="20" font-family="Arial" fill="#1f4e79">编码方式很重要</text>
</g>
<g transform="translate(370,385)">
  <rect x="0" y="0" width="230" height="55" rx="24" fill="#f1fbf0" stroke="#bfe0bb" stroke-width="2"/>
  <text x="115" y="35" text-anchor="middle" font-size="20" font-family="Arial" fill="#2f6b2b">协变量控制混杂</text>
</g>
<g transform="translate(645,385)">
  <rect x="0" y="0" width="185" height="55" rx="24" fill="#fff6ea" stroke="#f1cf94" stroke-width="2"/>
  <text x="92.5" y="35" text-anchor="middle" font-size="20" font-family="Arial" fill="#8a5a16">标准化改单位</text>
</g>
<g transform="translate(875,385)">
  <rect x="0" y="0" width="190" height="55" rx="24" fill="#f7f3ff" stroke="#d1c3f2" stroke-width="2"/>
  <text x="95" y="35" text-anchor="middle" font-size="20" font-family="Arial" fill="#5b4d9a">混合模型控结构</text>
</g>
</svg>