<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430">
<rect width="1200" height="430" fill="#f7fbff"/>
<text x="600" y="68" text-anchor="middle" font-size="34" font-family="Arial" fill="#1f4e79" font-weight="700">标准化会改什么，不会改什么</text>
<text x="600" y="100" text-anchor="middle" font-size="18" font-family="Arial" fill="#5a7188">它通常改变的是单位解释，不是显著性本身</text>

<g transform="translate(110,150)">
  <circle cx="70" cy="70" r="60" fill="#eef6ff" stroke="#9bc2ea" stroke-width="3"/>
  <rect x="34" y="130" width="72" height="54" rx="16" fill="#dcecff"/>
  <circle cx="48" cy="65" r="7" fill="#203040"/>
  <circle cx="92" cy="65" r="7" fill="#203040"/>
  <path d="M44 90 Q70 110 96 90" stroke="#203040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="70" y="214" text-anchor="middle" font-size="22" font-family="Arial" fill="#1f4e79">原始 y</text>
  <text x="70" y="244" text-anchor="middle" font-size="18" font-family="Arial" fill="#56738f">单位保留</text>
</g>

<g transform="translate(365,150)">
  <circle cx="70" cy="70" r="60" fill="#f1fbf0" stroke="#bfe0bb" stroke-width="3"/>
  <path d="M30 120 Q70 30 110 120" stroke="#60a85a" stroke-width="6" fill="none"/>
  <line x1="70" y1="25" x2="70" y2="118" stroke="#60a85a" stroke-width="5"/>
  <text x="70" y="214" text-anchor="middle" font-size="22" font-family="Arial" fill="#2f6b2b">z-score y</text>
  <text x="70" y="244" text-anchor="middle" font-size="18" font-family="Arial" fill="#4f7f49">β 变成表型 SD</text>
</g>

<g transform="translate(620,150)">
  <circle cx="70" cy="70" r="60" fill="#fff8ef" stroke="#f2c98e" stroke-width="3"/>
  <text x="70" y="78" text-anchor="middle" font-size="34" font-family="Arial" fill="#8a5a16" font-weight="700">0 1 2</text>
  <text x="70" y="214" text-anchor="middle" font-size="22" font-family="Arial" fill="#8a5a16">原始 g</text>
  <text x="70" y="244" text-anchor="middle" font-size="18" font-family="Arial" fill="#8a5a16">β = per allele</text>
</g>

<g transform="translate(875,150)">
  <circle cx="70" cy="70" r="60" fill="#f7f3ff" stroke="#d1c3f2" stroke-width="3"/>
  <text x="70" y="72" text-anchor="middle" font-size="28" font-family="Arial" fill="#5b4d9a" font-weight="700">(g-μ)/σ</text>
  <text x="70" y="214" text-anchor="middle" font-size="22" font-family="Arial" fill="#5b4d9a">z-score g</text>
  <text x="70" y="244" text-anchor="middle" font-size="18" font-family="Arial" fill="#5b4d9a">β = per genotype SD</text>
</g>

<path d="M255 220 L365 220" stroke="#6f92b6" stroke-width="7" fill="none" stroke-linecap="round"/>
<polygon points="365,220 343,208 343,232" fill="#6f92b6"/>
<path d="M765 220 L875 220" stroke="#6f92b6" stroke-width="7" fill="none" stroke-linecap="round"/>
<polygon points="875,220 853,208 853,232" fill="#6f92b6"/>

<rect x="270" y="315" width="660" height="62" rx="26" fill="#ffffff" stroke="#d7e6f5" stroke-width="3"/>
<text x="600" y="353" text-anchor="middle" font-size="22" font-family="Arial" fill="#1f4e79">常见情况下：β 和 SE 会按比例变化，但 t / z 与 p 往往几乎不变</text>
</svg>