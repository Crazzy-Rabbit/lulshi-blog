<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <style>
    .t{font: 24px sans-serif; fill:#22324a}
    .s{font: 20px sans-serif; fill:#2f4f6f}
    .b{fill:#f7f9fc; stroke:#6d8bb3; stroke-width:2; rx:16}
    .d{fill:#fff7ee; stroke:#c98b3b; stroke-width:2; rx:16}
    .arrow{stroke:#576b86; stroke-width:3; marker-end:url(#m)}
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#576b86"/>
    </marker>
  </defs>
  <text x="490" y="44" text-anchor="middle" class="t">对象切片示意图</text>

  <rect x="70" y="100" width="300" height="220" class="b"/>
  <text x="220" y="140" text-anchor="middle" class="t">Dog 对象</text>
  <rect x="110" y="175" width="220" height="55" class="d"/>
  <text x="220" y="210" text-anchor="middle" class="s">Animal 基类部分</text>
  <rect x="110" y="245" width="220" height="55" class="d"/>
  <text x="220" y="280" text-anchor="middle" class="s">Dog 自己新增的部分</text>

  <line x1="390" y1="210" x2="585" y2="210" class="arrow"/>
  <text x="488" y="185" text-anchor="middle" class="s">按值传给 Animal a</text>

  <rect x="620" y="135" width="280" height="150" class="b"/>
  <text x="760" y="175" text-anchor="middle" class="t">函数形参 Animal a</text>
  <rect x="665" y="210" width="190" height="55" class="d"/>
  <text x="760" y="245" text-anchor="middle" class="s">只剩 Animal 那一层</text>
</svg>