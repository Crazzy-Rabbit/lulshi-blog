<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="380" viewBox="0 0 1080 380">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1080" height="380" fill="#ffffff"/>
  <text x="40" y="38" font-size="24" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#0f172a">
    const 成员函数：我只看对象，不改对象
  </text>

  <rect x="40" y="90" width="240" height="220" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="40" y="90" width="240" height="46" rx="18" fill="#6366f1"/>
  <text x="64" y="120" font-size="22" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#ffffff">
    普通对象 acc
  </text>
  <text x="64" y="172" font-size="18" font-family="Consolas, monospace" fill="#1f2937">acc.deposit(100);</text>
  <text x="64" y="206" font-size="18" font-family="Consolas, monospace" fill="#1f2937">acc.showBalance();</text>
  <text x="64" y="258" font-size="17" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#374151">
    普通对象可以调用：
  </text>
  <text x="64" y="288" font-size="17" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#374151">
    普通成员函数 + const 成员函数
  </text>

  <rect x="420" y="80" width="240" height="240" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="420" y="80" width="240" height="56" rx="18" fill="#0ea5e9"/>
  <text x="452" y="116" font-size="22" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#ffffff">
    类中的两个函数
  </text>
  <text x="450" y="178" font-size="18" font-family="Consolas, monospace" fill="#0f172a">void deposit(double x)</text>
  <text x="450" y="214" font-size="18" font-family="Consolas, monospace" fill="#0f172a">void showBalance() const</text>
  <text x="450" y="266" font-size="16" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#475569">
    前者会修改 balance
  </text>
  <text x="450" y="292" font-size="16" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#475569">
    后者只读取 owner 和 balance
  </text>

  <rect x="800" y="90" width="240" height="220" rx="18" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <rect x="800" y="90" width="240" height="46" rx="18" fill="#ef4444"/>
  <text x="822" y="120" font-size="22" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#ffffff">
    const 对象 b
  </text>
  <text x="824" y="172" font-size="18" font-family="Consolas, monospace" fill="#1f2937">b.showInfo();   ✓</text>
  <text x="824" y="206" font-size="18" font-family="Consolas, monospace" fill="#1f2937">b.deposit(50);  ✗</text>
  <text x="824" y="258" font-size="17" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#7f1d1d">
    const 对象只能调用：
  </text>
  <text x="824" y="288" font-size="17" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#7f1d1d">
    const 成员函数
  </text>

  <line x1="280" y1="200" x2="420" y2="200" stroke="#475569" stroke-width="3" marker-end="url(#arrow2)"/>
  <line x1="660" y1="200" x2="800" y2="200" stroke="#475569" stroke-width="3" marker-end="url(#arrow2)"/>

  <text x="40" y="350" font-size="15" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#475569">
    最朴素的理解：函数后面加 const，就是在声明“这个函数不会改当前对象”。
  </text>
</svg>
