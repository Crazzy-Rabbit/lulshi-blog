<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"></path>
    </marker>
  </defs>

  <rect width="960" height="380" fill="#ffffff"></rect>

  <text x="40" y="38" font-size="24" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#0f172a">
    public 和 private：接口与内部状态
  </text>

  <rect x="40" y="120" width="160" height="90" rx="16" fill="#eef2ff" stroke="#6366f1" stroke-width="2"></rect>
  <text x="72" y="155" font-size="20" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#3730a3">
    外部代码
  </text>
  <text x="60" y="188" font-size="16" font-family="Consolas, monospace" fill="#1f2937">
    main() / other code
  </text>

  <line x1="200" y1="165" x2="300" y2="165" stroke="#475569" stroke-width="3" marker-end="url(#arrow2)"></line>

  <rect x="300" y="70" width="420" height="250" rx="20" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"></rect>

  <rect x="300" y="70" width="420" height="70" rx="20" fill="#22c55e"></rect>
  <text x="330" y="112" font-size="24" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#ffffff">
    public：对外开放的操作接口
  </text>

  <rect x="330" y="165" width="100" height="44" rx="10" fill="#dcfce7" stroke="#22c55e"></rect>
  <rect x="455" y="165" width="110" height="44" rx="10" fill="#dcfce7" stroke="#22c55e"></rect>
  <rect x="590" y="165" width="100" height="44" rx="10" fill="#dcfce7" stroke="#22c55e"></rect>

  <text x="344" y="193" font-size="16" font-family="Consolas, monospace" fill="#166534">deposit()</text>
  <text x="470" y="193" font-size="16" font-family="Consolas, monospace" fill="#166534">withdraw()</text>
  <text x="604" y="193" font-size="16" font-family="Consolas, monospace" fill="#166534">showBalance()</text>

  <rect x="320" y="230" width="380" height="70" rx="14" fill="#e2e8f0" stroke="#64748b"></rect>
  <text x="345" y="258" font-size="20" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#334155">
    private：内部状态，外部不能直接改
  </text>
  <text x="345" y="288" font-size="17" font-family="Consolas, monospace" fill="#0f172a">
    string owner;   double balance;
  </text>

  <line x1="130" y1="220" x2="340" y2="265" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 6"></line>
  <text x="95" y="250" font-size="18" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#dc2626">
    不能直接碰
  </text>
  <text x="246" y="286" font-size="28" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#dc2626">
    ×
  </text>

  <rect x="760" y="100" width="160" height="150" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="2"></rect>
  <text x="785" y="135" font-size="20" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#9a3412">
    封装的意义
  </text>
  <text x="780" y="170" font-size="16" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#7c2d12">
    1. 防止非法修改
  </text>
  <text x="780" y="200" font-size="16" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#7c2d12">
    2. 统一检查规则
  </text>
  <text x="780" y="230" font-size="16" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#7c2d12">
    3. 更容易维护
  </text>

  <text x="40" y="350" font-size="15" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#475569">
    不是为了“故意麻烦”，而是为了让对象只通过合法方式改变自己的状态。
  </text>
</svg>