<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500">
  <style>
    .t{font: 24px sans-serif; fill:#22324a}
    .s{font: 20px sans-serif; fill:#2f4f6f}
    .b{fill:#f7f9fc; stroke:#6d8bb3; stroke-width:2; rx:16}
    .d{fill:#fff8ef; stroke:#c98b3b; stroke-width:2; rx:16}
    .arrow{stroke:#576b86; stroke-width:3; marker-end:url(#m)}
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#576b86"/>
    </marker>
  </defs>
  <text x="490" y="44" text-anchor="middle" class="t">通过基类指针删除对象时的析构顺序</text>

  <rect x="60" y="90" width="390" height="340" class="b"/>
  <text x="255" y="130" text-anchor="middle" class="t">基类析构不是 virtual</text>
  <rect x="120" y="175" width="270" height="70" class="d"/>
  <text x="255" y="205" text-anchor="middle" class="s">Animal* p = new Dog();</text>
  <text x="255" y="232" text-anchor="middle" class="s">delete p;</text>
  <rect x="120" y="285" width="270" height="85" class="d"/>
  <text x="255" y="322" text-anchor="middle" class="s">可能只调用 Animal 析构</text>
  <text x="255" y="352" text-anchor="middle" class="s">Dog 的清理逻辑可能丢失</text>

  <rect x="530" y="90" width="390" height="340" class="b"/>
  <text x="725" y="130" text-anchor="middle" class="t">基类析构是 virtual</text>
  <rect x="590" y="175" width="270" height="70" class="d"/>
  <text x="725" y="205" text-anchor="middle" class="s">Animal* p = new Dog();</text>
  <text x="725" y="232" text-anchor="middle" class="s">delete p;</text>
  <rect x="590" y="275" width="270" height="95" class="d"/>
  <text x="725" y="312" text-anchor="middle" class="s">先调用 Dog 析构</text>
  <text x="725" y="342" text-anchor="middle" class="s">再调用 Animal 析构</text>
</svg>