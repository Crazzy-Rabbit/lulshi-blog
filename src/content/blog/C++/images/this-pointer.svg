<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1080" height="360" fill="#ffffff"/>
  <text x="40" y="38" font-size="24" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#0f172a">
    this 指针：同一个成员函数，为什么知道自己在操作谁
  </text>

  <rect x="40" y="80" width="250" height="210" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="40" y="80" width="250" height="46" rx="18" fill="#6366f1"/>
  <text x="62" y="110" font-size="22" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#ffffff">
    p1 : Player
  </text>
  <text x="62" y="155" font-size="18" font-family="Consolas, monospace" fill="#1f2937">name = "Alice"</text>
  <text x="62" y="185" font-size="18" font-family="Consolas, monospace" fill="#1f2937">hp = 50</text>
  <text x="62" y="235" font-size="18" font-family="Consolas, monospace" fill="#1f2937">p1.heal(20)</text>

  <rect x="330" y="80" width="420" height="210" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="330" y="80" width="420" height="46" rx="18" fill="#0ea5e9"/>
  <text x="356" y="110" font-size="22" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#ffffff">
    成员函数 void heal(int amount)
  </text>
  <text x="360" y="160" font-size="18" font-family="Consolas, monospace" fill="#0f172a">this  ——&gt;  当前调用者对象</text>
  <text x="360" y="196" font-size="18" font-family="Consolas, monospace" fill="#0f172a">this-&gt;hp += amount;</text>
  <text x="360" y="232" font-size="18" font-family="Consolas, monospace" fill="#0f172a">cout &lt;&lt; this-&gt;name;</text>

  <rect x="790" y="80" width="250" height="210" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <rect x="790" y="80" width="250" height="46" rx="18" fill="#22c55e"/>
  <text x="812" y="110" font-size="22" font-weight="700" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#ffffff">
    p2 : Player
  </text>
  <text x="812" y="155" font-size="18" font-family="Consolas, monospace" fill="#1f2937">name = "Bob"</text>
  <text x="812" y="185" font-size="18" font-family="Consolas, monospace" fill="#1f2937">hp = 80</text>
  <text x="812" y="235" font-size="18" font-family="Consolas, monospace" fill="#1f2937">p2.heal(10)</text>

  <line x1="290" y1="185" x2="330" y2="185" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="750" y1="185" x2="790" y2="185" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="40" y="330" font-size="15" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#475569">
    当调用者不同，函数体里的 this 就会指向不同对象；这就是成员函数能“自动知道自己在操作谁”的原因。
  </text>
</svg>
