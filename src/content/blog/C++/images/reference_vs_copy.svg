<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <style>
      .title{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#2b2d42}
      .label{font:600 18px 'Segoe UI',Arial,sans-serif;fill:#333}
      .small{font:500 15px 'Segoe UI',Arial,sans-serif;fill:#555}
      .value{font:700 30px Consolas,monospace;fill:#1d3557}
      .addr{font:600 14px Consolas,monospace;fill:#6d6875}
      .box{fill:#f1f5f9;stroke:#94a3b8;stroke-width:2;rx:14}
      .box2{fill:#eef7ff;stroke:#3b82f6;stroke-width:2;rx:14}
      .box3{fill:#fff7ed;stroke:#f59e0b;stroke-width:2;rx:14}
      .arrow{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="24" y="34" class="title">引用不是新对象，而是原对象的另一个名字</text>

  <rect x="30" y="70" width="390" height="170" class="box"/>
  <text x="48" y="102" class="label">普通赋值：产生一个新变量</text>
  <rect x="60" y="125" width="130" height="85" class="box2"/>
  <text x="78" y="148" class="small">int a</text>
  <text x="72" y="180" class="value">10</text>
  <text x="72" y="202" class="addr">地址: 0x100</text>

  <rect x="255" y="125" width="130" height="85" class="box3"/>
  <text x="273" y="148" class="small">int b = a</text>
  <text x="267" y="180" class="value">10</text>
  <text x="267" y="202" class="addr">地址: 0x200</text>
  <path d="M190 167 C220 167, 220 167, 255 167" class="arrow"/>
  <text x="195" y="152" class="small">值被复制</text>

  <rect x="465" y="70" width="390" height="170" class="box"/>
  <text x="483" y="102" class="label">引用：不给对象复制一份，而是起别名</text>
  <rect x="530" y="125" width="150" height="85" class="box2"/>
  <text x="548" y="148" class="small">int x</text>
  <text x="548" y="180" class="value">10</text>
  <text x="548" y="202" class="addr">地址: 0x300</text>
  <text x="720" y="155" class="label">int&amp; r = x</text>
  <path d="M710 165 C690 165, 690 165, 680 165" class="arrow"/>
  <text x="706" y="192" class="small">r 指向的其实就是 x</text>
</svg>
